<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tempahan Bilik PPSM (Firebase)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* GAYA ASAS & LATAR BELAKANG */
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 30px 20px; 
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
            color: #2c3e50; 
            min-height: 100vh;
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            position: relative; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        
        .lang-switch { position: absolute; top: 20px; right: 20px; background: #fff; padding: 5px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid #f1f2f6;}
        .lang-switch button { border: none; background: transparent; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px; color: #7f8c8d; transition: 0.3s; }
        .lang-switch button:hover { color: #667eea; }
        .lang-switch button.active-lang { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4); }
        
        .header-title { text-align: center; margin-bottom: 30px; margin-top: 10px; color: #2c3e50; font-weight: 800; font-size: 34px; text-transform: uppercase; letter-spacing: 1px; }
        .header-title span { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* TAB UTAMA */
        .tabs { display: flex; justify-content: center; margin-bottom: 35px; background: #f8f9fa; padding: 10px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 700px; margin-left: auto; margin-right: auto; flex-wrap: wrap; border: 2px solid #eef2f3;}
        .tabs button { background-color: transparent; color: #7f8c8d; border: none; padding: 12px 25px; margin: 0 5px; cursor: pointer; border-radius: 30px; font-size: 15px; font-weight: 600; transition: all 0.3s ease; }
        .tabs button:hover { color: #667eea; background: #fdfbfb;}
        .tabs button.active-tab { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; box-shadow: 0 4px 12px rgba(79, 172, 254, 0.4); }
        
        .tab-content { display: none; background: white; padding: 30px; border-radius: 15px; border: 1px solid #f1f2f6; box-shadow: 0 10px 30px rgba(0,0,0,0.03); animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 3px solid #f1f2f6; padding-bottom: 15px; margin-bottom: 25px; font-weight: 700; font-size: 22px;}
        
        /* SUB-TAB UNTUK KATEGORI BILIK */
        .sub-tabs { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; background: #f1f5f9; padding: 8px; border-radius: 12px;}
        .sub-tabs button { flex: 1; background: transparent; border: none; padding: 10px 15px; border-radius: 8px; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; color: #64748b; transition: 0.3s;}
        .sub-tabs button:hover { color: #0f172a; }
        .sub-tabs button.active { background: white; color: #667eea; box-shadow: 0 2px 8px rgba(0,0,0,0.08);}
        
        /* PILIHAN BILIK (RADIO BUTTONS) */
        .room-options { display: none; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px;}
        .room-options.active { display: grid; animation: fadeIn 0.3s ease;}
        .room-card { display: block; cursor: pointer; position: relative;}
        .room-card input { position: absolute; opacity: 0; cursor: pointer; }
        .room-card span { display: block; padding: 15px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; text-align: center; font-weight: 600; color: #34495e; transition: 0.3s; font-size: 14px;}
        .room-card:hover span { border-color: #4facfe; background: #f0f8ff;}
        .room-card input:checked ~ span { background: #e3f2fd; border-color: #4facfe; color: #0984e3; box-shadow: 0 4px 10px rgba(79, 172, 254, 0.2);}

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        .form-group label.main-label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #34495e; text-transform: uppercase; letter-spacing: 0.5px;}
        .input-large, .input-font-only { width: 100%; padding: 14px 18px; font-size: 15px; font-family: 'Poppins', sans-serif; box-sizing: border-box; border: 2px solid #e2e8f0; border-radius: 10px; background-color: #f8fafc; transition: all 0.3s ease; }
        .input-large:focus, .input-font-only:focus { border-color: #4facfe; background-color: #fff; outline: none; box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.15); }
        .input-large:disabled { background-color: #e9ecef; color: #95a5a6; cursor: not-allowed; border-color: #e9ecef; }
        
        .radio-group { padding: 15px 20px; background: #f8fafc; border-radius: 10px; border: 2px solid #e2e8f0; }
        .radio-group label { display: inline-block; font-weight: 500; margin-right: 25px; cursor: pointer; color: #34495e; font-size: 15px;}
        .radio-group input { transform: scale(1.3); margin-right: 8px; cursor: pointer; accent-color: #4facfe;}
        
        button.submit-btn { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: #105a30; padding: 16px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 700; width: 100%; margin-top: 25px; box-shadow: 0 8px 20px rgba(67, 233, 123, 0.3); transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;}
        button.submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(67, 233, 123, 0.5); color: #0a3d1f;}
        
        .action-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px; }
        .print-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600; box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3); transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px;}
        .print-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245, 87, 108, 0.5); }
        
        .table-responsive { overflow-x: auto; margin-top: 10px; margin-bottom: 40px; border-radius: 12px; border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.05);}
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden;}
        #senarai-table { min-width: 800px; } 
        
        th, td { border: 1px solid #edf2f7; padding: 16px 12px; text-align: center; vertical-align: middle; }
        th { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        td:first-child { background-color: #f8fafc; font-weight: 700; color: #2c3e50; }
        
        .room-title { color: #fff; background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); padding: 15px 20px; border-radius: 12px 12px 0 0; margin: 30px 0 0 0; font-size: 18px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); font-weight: 700;}
        .booking-slot { background: #fffaf0; border-left: 5px solid #ff9f43; font-size: 13px; padding: 12px; border-radius: 6px; margin: 5px 0; color: #d35400; position: relative; box-shadow: 0 2px 6px rgba(0,0,0,0.04); text-align: left; line-height: 1.5; border-right: 1px solid #ffeaa7; border-top: 1px solid #ffeaa7; border-bottom: 1px solid #ffeaa7;}
        .booking-slot strong { display: block; font-size: 14px; color: #2d3436; margin-bottom: 4px;}
        
        .btn-batal { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); color: white; border: none; border-radius: 6px; font-size: 13px; padding: 8px 15px; cursor: pointer; display: inline-block; font-family: 'Poppins', sans-serif; font-weight: 600; box-shadow: 0 4px 10px rgba(255, 8, 68, 0.3); transition: 0.3s;}
        .btn-batal:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(255, 8, 68, 0.5);}
        
        #status-msg { margin-top: 20px; font-weight: 700; color: #e67e22; font-size: 16px; text-align: center;}
        .status-jadual { margin-bottom: 15px; font-weight: 600; color: #0984e3; background: #e3f2fd; padding: 12px; border-radius: 8px; border-left: 4px solid #0984e3; display: none; text-align: center;}
        
        .jadual-cat-group { display: none; }
        .jadual-cat-group.active { display: block; animation: fadeIn 0.3s ease; }

        @media (max-width: 768px) { 
            body { padding: 15px; }
            .container { padding: 25px 15px; }
            .form-grid { grid-template-columns: 1fr; } 
            .action-buttons { justify-content: center; } 
            .lang-switch { position: relative; text-align: center; margin-bottom: 15px; top: 0; right: 0; background: transparent; box-shadow: none; border: none;} 
            .tabs button { padding: 10px 15px; font-size: 13px; margin-bottom: 8px; width: 45%;}
            .sub-tabs { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="lang-switch">
            <button id="btn-ms" class="active-lang" onclick="changeLang('ms')">🇲🇾 BM</button>
            <button id="btn-en" onclick="changeLang('en')">🇬🇧 EN</button>
        </div>

        <h1 class="header-title" data-i18n="title">Sistem Tempahan <span>Bilik PPSM</span></h1>

        <div class="tabs">
            <button id="btnTab1" class="active-tab" onclick="openTab('borangTab', this)" data-i18n="tab_book">📝 Tempahan</button>
            <button id="btnTab3" onclick="openTab('senaraiTab', this)" data-i18n="tab_list">📋 Senarai Tempahan</button>
            <button id="btnTab2" onclick="openTab('jadualTab', this)" data-i18n="tab_sch">🗓️ Papar Jadual</button>
        </div>

        <!-- TAB 1: BORANG -->
        <div id="borangTab" class="tab-content active">
            <h2 data-i18n="form_title">Butiran Tempahan Baru</h2>
            <form id="bookingForm">
                
                <!-- LAYOUT BILIK BARU (3 TAB) -->
                <div class="form-group full-width">
                    <label class="main-label" data-i18n="lbl_room">🏢 Pilih Kategori & Bilik:</label>
                    
                    <div class="sub-tabs">
                        <button type="button" class="sub-btn active" onclick="switchRoomTab('cat-tut', this)" data-i18n="cat_tut">Bilik Tutorial</button>
                        <button type="button" class="sub-btn" onclick="switchRoomTab('cat-lab', this)" data-i18n="cat_lab">Makmal Komputer</button>
                        <button type="button" class="sub-btn" onclick="switchRoomTab('cat-fac', this)" data-i18n="cat_fac">Bilik Kemudahan</button>
                    </div>

                    <div id="cat-tut" class="room-options active">
                        <label class="room-card"><input type="radio" name="bilik" value="Bilik Tutorial 102"> <span>Bilik Tutorial 102</span></label>
                        <label class="room-card"><input type="radio" name="bilik" value="Bilik Tutorial 105"> <span>Bilik Tutorial 105</span></label>
                        <label class="room-card"><input type="radio" name="bilik" value="Bilik Tutorial 106"> <span>Bilik Tutorial 106</span></label>
                    </div>

                    <div id="cat-lab" class="room-options">
                        <label class="room-card"><input type="radio" name="bilik" value="Makmal Komputer 1"> <span>Makmal Komputer 1 (Lab 1)</span></label>
                        <label class="room-card"><input type="radio" name="bilik" value="Makmal Komputer 2"> <span>Makmal Komputer 2 (Lab 2)</span></label>
                        <label class="room-card"><input type="radio" name="bilik" value="Makmal Komputer 3"> <span>Makmal Komputer 3 (Lab 3)</span></label>
                    </div>

                    <div id="cat-fac" class="room-options">
                        <label class="room-card"><input type="radio" name="bilik" value="Bilik Seminar 107"> <span>Bilik Seminar 107</span></label>
                        <label class="room-card"><input type="radio" name="bilik" value="Bilik The Space"> <span>Bilik The Space</span></label>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group full-width">
                        <label class="main-label" data-i18n="lbl_type">📌 Jenis Tempahan:</label>
                        <div class="radio-group">
                            <label><input type="radio" id="jenisSemester" name="jenis" value="Semester" checked onchange="toggleDate()"> <span data-i18n="opt_sem">📚 Semester (14 Minggu)</span></label>
                            <label><input type="radio" id="jenisAdhoc" name="jenis" value="Ad-Hoc" onchange="toggleDate()"> <span data-i18n="opt_adhoc">📅 Ad-Hoc (Bertarikh)</span></label>
                        </div>
                    </div>

                    <div class="form-group" id="dateGroup" style="display: none;">
                        <label class="main-label" data-i18n="lbl_date">📅 Tarikh (Ad-Hoc):</label>
                        <input type="date" id="tarikh" class="input-large" onchange="syncHari()">
                    </div>

                    <div class="form-group">
                        <label class="main-label" data-i18n="lbl_day">📆 Hari:</label>
                        <select id="hari" class="input-large" required>
                            <option value="" disabled selected data-i18n="opt_day">-- Pilih Hari --</option>
                            <option value="Isnin" data-i18n="day_mon">Isnin</option>
                            <option value="Selasa" data-i18n="day_tue">Selasa</option>
                            <option value="Rabu" data-i18n="day_wed">Rabu</option>
                            <option value="Khamis" data-i18n="day_thu">Khamis</option>
                            <option value="Jumaat" data-i18n="day_fri">Jumaat</option>
                            <option value="Sabtu" data-i18n="day_sat">Sabtu</option>
                            <option value="Ahad" data-i18n="day_sun">Ahad</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="main-label" data-i18n="lbl_start">⏰ Masa Mula:</label>
                        <select id="masaMula" class="input-large" required>
                            <option value="" disabled selected data-i18n="opt_start">-- Pilih Masa Mula --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="main-label" data-i18n="lbl_end">⏳ Masa Tamat:</label>
                        <select id="masaTamat" class="input-large" required>
                            <option value="" disabled selected data-i18n="opt_end">-- Pilih Masa Tamat --</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label class="main-label" data-i18n="lbl_name">👤 Nama Penempah / Tujuan:</label>
                        <input type="text" id="nama" class="input-font-only" required placeholder="Contoh: MAT111 - LSK" data-placeholder-ms="Contoh: MAT111 - LSK" data-placeholder-en="Example: MAT111 - LSK">
                    </div>
                </div>

                <button type="button" class="submit-btn" id="btn-simpan" onclick="simpanTempahan()" data-i18n="btn_save">✅ Simpan Tempahan</button>
                <div id="status-msg"></div>
            </form>
        </div>

        <!-- TAB 2: SENARAI TEMPAHAN -->
        <div id="senaraiTab" class="tab-content">
            <h2 data-i18n="list_title">Senarai Keseluruhan Tempahan</h2>
            
            <div id="status-senarai" class="status-jadual" data-i18n="status_load">⏳ Memuat turun data terkini dari pangkalan data...</div>
            
            <div class="table-responsive">
                <table id="senarai-table">
                    <thead>
                        <tr>
                            <th data-i18n="col_room">Bilik</th>
                            <th data-i18n="col_name">Nama Penempah</th>
                            <th data-i18n="col_type">Jenis</th>
                            <th data-i18n="col_datetime">Tarikh & Masa</th>
                            <th data-i18n="col_action">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="senarai-body">
                        <!-- Data Senarai akan dipaparkan di sini -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- TAB 3: JADUAL (Papar Sahaja) -->
        <div id="jadualTab" class="tab-content">
            <h2 data-i18n="sch_title">Jadual Rasmi Tempahan</h2>
            <div class="action-buttons">
                <button class="print-btn" onclick="exportHTMLToWord()" data-i18n="btn_print">🖨️ Cetak ke MS Word</button>
            </div>
            
            <!-- FILTER TAB UNTUK JADUAL -->
            <div class="sub-tabs" style="margin-top: -10px; margin-bottom: 20px;">
                <button type="button" class="j-sub-btn active" onclick="switchJadualTab('j-cat-tut', this)" data-i18n="cat_tut">Bilik Tutorial</button>
                <button type="button" class="j-sub-btn" onclick="switchJadualTab('j-cat-lab', this)" data-i18n="cat_lab">Makmal Komputer</button>
                <button type="button" class="j-sub-btn" onclick="switchJadualTab('j-cat-fac', this)" data-i18n="cat_fac">Bilik Kemudahan</button>
            </div>

            <div id="status-jadual" class="status-jadual" data-i18n="status_load">⏳ Memuat turun data terkini dari pangkalan data...</div>
            
            <!-- Container untuk setiap kategori jadual -->
            <div id="j-cat-tut" class="jadual-cat-group active"></div>
            <div id="j-cat-lab" class="jadual-cat-group"></div>
            <div id="j-cat-fac" class="jadual-cat-group"></div>
            
        </div>
    </div>

    <!-- PENGHUBUNG FIREBASE -->

                'cat_tut': 'Tutorial Room', 'cat_lab': 'Computer Lab', 'cat_fac': 'Facility Room',
                'lbl_type': '📌 Booking Type:', 'opt_sem': '📚 Semester (14 Weeks)', 'opt_adhoc': '📅 Ad-Hoc (Specific Date)',
                'lbl_date': '📅 Date (Ad-Hoc):', 'lbl_day': '📆 Day:', 'opt_day': '-- Select Day --',
                'day_mon': 'Monday', 'day_tue': 'Tuesday', 'day_wed': 'Wednesday', 'day_thu': 'Thursday', 'day_fri': 'Friday', 'day_sat': 'Saturday', 'day_sun': 'Sunday',
                'lbl_start': '⏰ Start Time:', 'opt_start': '-- Select Start Time --',
                'lbl_end': '⏳ End Time:', 'opt_end': '-- Select End Time --',
                'lbl_name': '👤 Booker Name / Purpose:',
                'btn_save': '✅ Save Booking', 'btn_saving': '⏳ Saving Booking...', 'msg_saving': 'Connecting to Database...',
                'sch_title': 'Official Booking Schedule', 'btn_print': '🖨️ Print to MS Word',
                'list_title': 'All Bookings List',
                'col_room': 'Room', 'col_name': 'Booker Name', 'col_type': 'Type', 'col_datetime': 'Date & Time', 'col_action': 'Action',
                'status_load': '⏳ Downloading latest data... Please wait.', 'status_fail': '❌ Failed to load schedule. Check connection.',
                'th_day_time': 'Day / Time', 'txt_cancel': 'Cancel Booking', 'txt_sem_badge': '📚 Semester',
                'alert_room': 'Please select a room from any category.', 'alert_date': 'Please enter a date.', 'alert_day': 'Please select a day.',
                'alert_time': 'Please select start and end times.', 'alert_logic': 'End time must be later than start time.',
                'alert_name': 'Please enter booker name.', 'alert_overlap': 'ERROR: This room is already booked for the selected date and time!',
                'alert_success': 'Booking Successfully Saved!', 'alert_err': 'System error. Please try again.',
                'prompt_pass': 'Please enter Admin Password to cancel this booking:', 'msg_delete': 'Verifying password and deleting data...',
                'del_success': 'Booking successfully canceled!', 'del_fail': 'Wrong password. Cancellation failed.'
            }
        };

        function format12Hour(hour) { return hour === 12 ? "12:00 PM" : hour > 12 ? (hour - 12) + ":00 PM" : hour + ":00 AM"; }
        for(let i=8; i<=21; i++) { waktuList.push({ valMula: i, valTamat: i + 1, labelMula: format12Hour(i), labelTamat: format12Hour(i + 1), labelSlot: format12Hour(i) + " - " + format12Hour(i + 1) }); }

        window.onload = function() {
            let mulaSelect = document.getElementById("masaMula");
            let tamatSelect = document.getElementById("masaTamat");
            waktuList.forEach(waktu => mulaSelect.add(new Option(waktu.labelMula, waktu.valMula)));
            for(let i=9; i<=22; i++) tamatSelect.add(new Option(format12Hour(i), i));
            window.muatTurunData();
        };

        window.changeLang = function(lang) {
            currentLang = lang;
            document.getElementById('btn-ms').classList.remove('active-lang');
            document.getElementById('btn-en').classList.remove('active-lang');
            document.getElementById('btn-' + lang).classList.add('active-lang');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                let key = el.getAttribute('data-i18n');
                if (langDict[lang][key]) el.innerHTML = langDict[lang][key];
            });
            let inputNama = document.getElementById('nama');
            inputNama.placeholder = inputNama.getAttribute('data-placeholder-' + lang);
            if(tempahanList.length > 0) {
                renderTable();
                renderSenarai();
            }
        };

        // KAWALAN TAB UTAMA
        window.openTab = function(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active-tab');
            if (tabId === 'jadualTab' || tabId === 'senaraiTab') window.muatTurunData();
        };

        // KAWALAN SUB-TAB KATEGORI BILIK (BORANG)
        window.switchRoomTab = function(tabId, btnElement) {
            document.querySelectorAll('.room-options').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.sub-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
            
            // Clear radio buttons bila tukar tab supaya tak tersalah simpan bilik tersembunyi
            let radios = document.querySelectorAll('input[name="bilik"]');
            radios.forEach(r => r.checked = false);
        };

        // KAWALAN SUB-TAB KATEGORI (JADUAL)
        window.switchJadualTab = function(tabId, btnElement) {
            document.querySelectorAll('.jadual-cat-group').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.j-sub-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        };

        window.toggleDate = function() {
            let adhoc = document.getElementById("jenisAdhoc").checked;
            document.getElementById("dateGroup").style.display = adhoc ? "block" : "none";
            let hariDropdown = document.getElementById("hari");
            if(adhoc) { hariDropdown.disabled = true; window.syncHari(); } 
            else { hariDropdown.disabled = false; }
        };

        window.syncHari = function() {
            let tarikhVal = document.getElementById("tarikh").value;
            if(tarikhVal) {
                let d = new Date(tarikhVal);
                let hariMalay = ["Ahad", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat", "Sabtu"];
                document.getElementById("hari").value = hariMalay[d.getDay()];
            }
        };

        window.simpanTempahan = async function() {
            let bilikObj = document.querySelector('input[name="bilik"]:checked');
            let bilik = bilikObj ? bilikObj.value : "";
            
            let jenis = document.querySelector('input[name="jenis"]:checked').value;
            let tarikh = document.getElementById("tarikh").value;
            let hari = document.getElementById("hari").value;
            let masaMula = document.getElementById("masaMula").value;
            let masaTamat = document.getElementById("masaTamat").value;
            let nama = document.getElementById("nama").value;

            let trans = langDict[currentLang];
            if(!bilik) return alert(trans.alert_room);
            if(jenis === "Ad-Hoc" && !tarikh) return alert(trans.alert_date);
            if(!hari) return alert(trans.alert_day);
            if(!masaMula || !masaTamat) return alert(trans.alert_time);
            if(parseInt(masaMula) >= parseInt(masaTamat)) return alert(trans.alert_logic);
            if(!nama) return alert(trans.alert_name);

            let isOverlap = tempahanList.some(t => {
                if (t.bilik === bilik && t.hari === hari) {
                    let timeClash = (parseInt(masaMula) < parseInt(t.masaTamat)) && (parseInt(masaTamat) > parseInt(t.masaMula));
                    if (timeClash) {
                        if (jenis === "Semester" || t.jenis === "Semester") return true; 
                        else if (jenis === "Ad-Hoc" && t.jenis === "Ad-Hoc") { return (t.tarikh === tarikh); }
                    }
                } return false;
            });

            if (isOverlap) { alert(trans.alert_overlap); return; }

            let data = { bilik, jenis, tarikh, hari, masaMula, masaTamat, nama, timestamp: new Date() };
            let btn = document.getElementById("btn-simpan");
            let msg = document.getElementById("status-msg");
            
            btn.disabled = true; btn.innerText = trans.btn_saving; msg.innerText = trans.msg_saving;

            try {
                await addDoc(collection(db, "tempahan"), data);
                
                let formatMula = format12Hour(masaMula);
                let formatTamat = format12Hour(masaTamat);
                let butiranTarikh = jenis === "Ad-Hoc" ? tarikh : "Semester";
                
                let subjekEmel = `Tempahan Baru PPSM: ${bilik}`;
                let teksEmel = `Notifikasi Tempahan Baru:\n\nBilik: ${bilik}\nNama Penempah: ${nama}\nJenis Tempahan: ${jenis}\nTarikh: ${butiranTarikh} (${hari})\nMasa: ${formatMula} - ${formatTamat}`;
                
                hantarEmel(EMAIL_ADMIN_1, subjekEmel, teksEmel);
                if(EMAIL_ADMIN_2) hantarEmel(EMAIL_ADMIN_2, subjekEmel, teksEmel);

                alert(trans.alert_success);
                document.getElementById("bookingForm").reset();
                window.toggleDate(); btn.disabled = false; btn.innerText = trans.btn_save; msg.innerText = ""; 
                window.muatTurunData();
            } catch (error) {
                console.error("Error adding document: ", error);
                alert(trans.alert_err); btn.disabled = false; btn.innerText = trans.btn_save; msg.innerText = "";
            }
        };

        window.muatTurunData = async function() {
            let trans = langDict[currentLang];
            let status1 = document.getElementById("status-jadual");
            let status2 = document.getElementById("status-senarai");
            
            status1.innerText = trans.status_load; status1.style.display = "block";
            status2.innerText = trans.status_load; status2.style.display = "block";
            
            try {
                const querySnapshot = await getDocs(collection(db, "tempahan"));
                tempahanList = [];
                querySnapshot.forEach((doc) => {
                    let d = doc.data();
                    d.id = doc.id; 
                    tempahanList.push(d);
                });
                renderTable(); 
                renderSenarai(); 
                status1.style.display = "none";
                status2.style.display = "none";
            } catch (error) {
                console.error("Error getting documents: ", error);
                status1.innerText = trans.status_fail; status1.style.color = "#e74c3c";
                status2.innerText = trans.status_fail; status2.style.color = "#e74c3c";
            }
        };

        window.batalTempahan = async function(docId) {
            let trans = langDict[currentLang];
            let password = prompt(trans.prompt_pass);
            if (!password) return; 
            
            if (password !== KATA_LALUAN_ADMIN) {
                alert(trans.del_fail);
                return;
            }

            let status = document.getElementById("status-senarai");
            status.innerText = trans.msg_delete;
            status.style.display = "block"; status.style.color = "#e67e22";

            try {
                await deleteDoc(doc(db, "tempahan", docId));
                alert(trans.del_success); 
                window.muatTurunData();
            } catch (error) {
                console.error("Error deleting document: ", error);
                alert(trans.alert_err); status.style.display = "none";
            }
        };

        const mapHari = { 'Isnin': 'day_mon', 'Selasa': 'day_tue', 'Rabu': 'day_wed', 'Khamis': 'day_thu', 'Jumaat': 'day_fri', 'Sabtu': 'day_sat', 'Ahad': 'day_sun' };

        // Render table yang dipecahkan ikut Kategori
        function renderTable() {
            let trans = langDict[currentLang];
            
            // Loop melalui setiap kategori (tut, lab, fac)
            for (const [katKey, senaraiBilik] of Object.entries(bilikKategori)) {
                let container = document.getElementById("j-cat-" + katKey);
                let html = "";
                
                senaraiBilik.forEach(bilik => {
                    html += `<h3 class="room-title">📍 ${bilik}</h3><div class="table-responsive"><table border="1" style="min-width:1400px;"><thead><tr><th>${trans.th_day_time}</th>`;
                    waktuList.forEach(waktu => html += `<th>${waktu.labelSlot}</th>`);
                    html += `</tr></thead><tbody>`;

                    hariList.forEach(h => {
                        let labelHari = trans[mapHari[h]];
                        html += `<tr><td>${labelHari}</td>`;
                        waktuList.forEach(waktu => {
                            html += `<td>`;
                            tempahanList.forEach(t => {
                                let mulaInt = parseInt(t.masaMula); let tamatInt = parseInt(t.masaTamat); let slotInt = waktu.valMula;
                                
                                if(t.bilik === bilik && t.hari === h && slotInt >= mulaInt && slotInt < tamatInt) {
                                    let tarikhTeks = t.tarikh ? t.tarikh : "";
                                    if(tarikhTeks) { let parts = tarikhTeks.split('-'); tarikhTeks = `${parts[2]}/${parts[1]}/${parts[0]}`; }
                                    
                                    let detail = t.jenis === "Ad-Hoc" ? `<br><small>📅 ${tarikhTeks}</small>` : `<br><small>${trans.txt_sem_badge}</small>`;
                                    html += `<div class="booking-slot"><strong>${t.nama}</strong>${detail}</div>`;
                                }
                            });
                            html += `</td>`;
                        });
                        html += `</tr>`;
                    });
                    html += `</tbody></table></div>`;
                });
                
                container.innerHTML = html;
            }
        }

        function renderSenarai() {
            let tbody = document.getElementById("senarai-body");
            let trans = langDict[currentLang];
            let html = "";

            if(tempahanList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#7f8c8d; padding:30px;">Tiada tempahan direkodkan.</td></tr>`;
                return;
            }

            tempahanList.forEach(t => {
                let mula = format12Hour(t.masaMula);
                let tamat = format12Hour(t.masaTamat);
                let tarikhText = "-";
                
                if (t.tarikh) {
                    let p = t.tarikh.split('-'); 
                    tarikhText = `${p[2]}/${p[1]}/${p[0]}`;
                }

                let hariLocal = trans[mapHari[t.hari]];
                let dateTimeTeks = t.jenis === 'Ad-Hoc' 
                    ? `<strong>${tarikhText}</strong> (${hariLocal})<br><small>${mula} - ${tamat}</small>` 
                    : `<strong>${trans.txt_sem_badge}</strong> (${hariLocal})<br><small>${mula} - ${tamat}</small>`;
                
                let jenisTeks = t.jenis === 'Ad-Hoc' ? '📅 Ad-Hoc' : trans.txt_sem_badge;

                html += `<tr>
                    <td><strong>${t.bilik}</strong></td>
                    <td>${t.nama}</td>
                    <td>${jenisTeks}</td>
                    <td>${dateTimeTeks}</td>
                    <td>
                        <button class="btn-batal" onclick="batalTempahan('${t.id}')">🗑️ ${trans.txt_cancel}</button>
                    </td>
                </tr>`;
            });
            
            tbody.innerHTML = html;
        }

        window.exportHTMLToWord = function() {
            // Kita cantumkan kesemua kategori jadual untuk diexport
            var preHtml = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Jadual Tempahan PPSM</title><style>@page WordSection1 {size: 841.9pt 595.3pt; mso-page-orientation: landscape; margin: 0.5in 0.5in 0.5in 0.5in;} div.WordSection1 {page: WordSection1;} table {width: 100%; border-collapse: collapse; margin-bottom: 30px;} th, td {border: 1px solid black; padding: 5px; text-align: center; vertical-align: top;} th {background-color: #f2f2f2; font-weight: bold;} .room-title {color: #333; margin-top: 30px; font-family: Arial; border-bottom: 2px solid #333; padding-bottom: 5px;} .booking-slot {font-size: 11px; margin-bottom:5px;}</style></head><body><div class='WordSection1'>";
            var postHtml = "</div></body></html>";
            
            var jadualContent = document.getElementById("j-cat-tut").innerHTML + 
                                document.getElementById("j-cat-lab").innerHTML + 
                                document.getElementById("j-cat-fac").innerHTML;
            
            var html = preHtml + jadualContent + postHtml;
            var blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            var url = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(html);
            
            var downloadLink = document.createElement("a");
            document.body.appendChild(downloadLink);
            downloadLink.href = url; downloadLink.download = 'Jadual_Tempahan_Bilik_PPSM.doc'; downloadLink.click();
            document.body.removeChild(downloadLink);
        };
    </script>
